<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevate Sentinel | Pro Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">E</div>
            <button class="nav-btn active" onclick="showTab('market')">📊</button>
            <button class="nav-btn" onclick="showTab('swap')">🔄</button>
        </nav>

        <main class="content">
            <header>
                <h1>Elevate <span class="accent-text">Sentinel</span></h1>
                <div class="status-bar"><span class="pulse"></span> Live Node: Ibadan</div>
            </header>

            <section id="market-tab" class="tab-content">
                <div id="market-cards" class="grid-3">
                    </div>
                
                <div class="card glass-card">
                    <h3 class="neon-text">Global Market Explorer (Top 100)</h3>
                    <div class="tradingview-widget-container" style="height: 500px;">
                        <div id="tradingview_screener"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
                        {
                          "width": "100%", "height": "100%", "defaultColumn": "overview",
                          "screener_type": "crypto_mkt", "displayCurrency": "USD",
                          "colorTheme": "dark", "locale": "en"
                        }
                        </script>
                    </div>
                </div>
            </section>

            <section id="swap-tab" class="tab-content" style="display:none;">
    <div class="card glass-card">
        <h2 class="neon-text">Instant Multi-Chain Swap</h2>
        <p style="opacity:0.7; font-size: 0.9rem;">Powered by Elevate Sentinel Security</p>
        
        <div class="iframe-container">
            <iframe 
                src="https://simpleswap.io/widget/4710173e-32d0-4034-8c85-6485f7560e90" 
                width="100%" 
                height="500px" 
                frameborder="0"
                style="border-radius: 16px;"
            ></iframe>
        </div>
    </div>
</section>
        </main>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js"></script>
</body>
</html>
