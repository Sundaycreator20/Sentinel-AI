<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI | WDK Console</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #10b981; 
            --blue: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-box {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .balance-amount { font-size: 32px; font-weight: bold; margin: 8px 0; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        .btn {
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-green { background: var(--accent); }
        .btn-blue { background: var(--blue); }
        .btn-outline { background: transparent; border: 1px solid #334155; }

        .console-box {
            background: #000;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            color: var(--accent);
            border-left: 3px solid var(--accent);
            margin-top: 10px;
            min-height: 40px;
            word-wrap: break-word;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .tx-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }

        #qr-container img {
            border: 8px solid white;
            border-radius: 8px;
            max-width: 150px;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="images/sentinel-logo.png" alt="Logo" style="width: 35px; height: 35px; border-radius: 8px;">
            <h2 style="margin:0; color: var(--accent);">Sentinel AI</h2>
        </div>
        <div style="background: rgba(16,185,129,0.1); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 1px solid var(--accent);">
            QVAC MAPPED
        </div>
    </div>

    <div class="section-box">
        <div style="display: flex; justify-content: space-between;">
            <span style="color: var(--text-dim); font-size: 14px;">Total Equity (USD)</span>
            <span onclick="toggleBalance()" style="cursor:pointer;" id="eye-toggle">👁️</span>
        </div>
        <div class="balance-amount" id="main-balance">$12,450.00</div>
        
        <div class="nav-grid">
            <button class="btn btn-green">➕ Add</button>
            <button class="btn btn-blue">📤 Send</button>
        </div>
    </div>

    <div class="section-box">
        <h3 style="margin-top:0; font-size:16px;">🛡️ WDK Keychain & GPS</h3>
        <p style="color: var(--text-dim); font-size:12px; margin-bottom:15px;">Local-first telemetry and secure derivation.</p>
        
        <div id="qr-container" style="display:none; text-align:center; margin-bottom:15px;">
            <img id="qr-img" src="" alt="QR">
        </div>

        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="lat" placeholder="Lat" readonly style="flex: 1; font-size: 11px;">
            <input type="text" id="lng" placeholder="Lng" readonly style="flex: 1; font-size: 11px;">
        </div>

        <div id="wdk-status" class="console-box">> Awaiting signal...</div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <button class="btn btn-outline" style="font-size: 13px;" onclick="detectLocation()">📍 Sync GPS</button>
            <button class="btn btn-outline" style="font-size: 13px;" onclick="generateWDK()">🔑 Gen WDK</button>
        </div>
    </div>

    <div class="section-box">
        <h3 style="margin-top:0; font-size:16px;">🤖 AI Command Agent</h3>
        <div style="position: relative; margin-bottom: 10px;">
            <input type="text" id="ai-input" placeholder="Ask Sentinel about BTC or trends..." style="padding-right: 40px;">
            <span onclick="startVoice()" style="position: absolute; right: 10px; top: 10px; cursor: pointer; font-size: 20px;">🎙️</span>
        </div>
        <button class="btn btn-blue" style="width:100%;" onclick="askAI()" id="ai-btn">Query Sentinel</button>
        <div id="ai-response" class="console-box" style="color: #cbd5e1; display:none; max-height: 120px; overflow-y: auto;"></div>
    </div>

    <div class="section-box" style="max-height: 150px; overflow-y:auto;">
        <h3 style="margin-top:0; font-size:14px; color: var(--text-dim);">Recent Activity</h3>
        <div id="tx-list">
            <div class="tx-item">
                <div><b style="color: var(--accent);">+ 2,500.00 USDT</b><br><small style="color: var(--text-dim);">Received • Success</small></div>
                <small style="color: var(--text-dim);">Today</small>
            </div>
            <div class="tx-item">
                <div><b style="color: #f87171;">- 0.045 BTC</b><br><small style="color: var(--text-dim);">Sent • Success</small></div>
                <small style="color: var(--text-dim);">2h ago</small>
            </div>
        </div>
    </div>
</div>

<script>
    let balHidden = false;
    const realBal = "$12,450.00";

    function toggleBalance() {
        balHidden = !balHidden;
        document.getElementById('main-balance').innerText = balHidden ? "****.**" : realBal;
        document.getElementById('eye-toggle').innerText = balHidden ? "🙈" : "👁️";
    }

    // 🔗 AI Backend Connection
    async function askAI() {
        const input = document.getElementById('ai-input');
        const btn = document.getElementById('ai-btn');
        const responseBox = document.getElementById('ai-response');
        if (!input.value) return;

        btn.disabled = true;
        btn.innerText = "Thinking...";
        responseBox.style.display = "block";
        responseBox.innerText = "> Searching Sentinel Network...";

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: input.value })
            });
            const data = await res.json();
            responseBox.innerText = "> " + data.reply;
        } catch (err) {
            responseBox.innerText = "> Error: Check internet connection.";
        } finally {
            btn.disabled = false;
            btn.innerText = "Query Sentinel";
        }
    }

    // 🎙️ Voice Logic
    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.onstart = () => { document.getElementById('ai-input').placeholder = "Listening..."; };
        recognition.onresult = (e) => {
            document.getElementById('ai-input').value = e.results[0][0].transcript;
            askAI();
        };
        recognition.start();
    }

    // 📍 GPS Logic
    function detectLocation() {
        const status = document.getElementById('wdk-status');
        if (!navigator.geolocation) return alert("GPS not supported.");
        status.innerText = "> [QVAC] Syncing satellites...";
        
        navigator.geolocation.getCurrentPosition((p) => {
            document.getElementById('lat').value = p.coords.latitude.toFixed(4);
            document.getElementById('lng').value = p.coords.longitude.toFixed(4);
            status.innerText = "> [QVAC] Location Fabric Locked.";
        }, (err) => { alert("Enable GPS permission."); });
    }

    // 🔑 WDK Wallet Logic
    function generateWDK() {
        const status = document.getElementById('wdk-status');
        const qrContainer = document.getElementById('qr-container');
        const qrImg = document.getElementById('qr-img');
        status.innerText = "> [WDK] Deriving non-custodial address...";
        
        setTimeout(() => {
            const addr = "bc1q" + Math.random().toString(36).substring(2, 12) + "...wdk";
            status.innerHTML = `<span style="color:white;">WDK ADDR:</span><br>${addr}`;
            qrImg.src = `https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=${addr}&choe=UTF-8`;
            qrContainer.style.display = "block";
        }, 1500);
    }
</script>

</body>
</html>
